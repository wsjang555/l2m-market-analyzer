<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L2M 마켓 분석기 — 로그인</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0f1a;
      font-family: 'Inter', sans-serif;
      padding: 1rem;
    }

    /* 배경 빛 효과 */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      font-size: 2.8rem;
      margin-bottom: 0.5rem;
      display: block;
    }

    .logo h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #e2e8f0;
      letter-spacing: -0.02em;
    }

    .logo p {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 0.25rem;
    }

    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      color: #fca5a5;
      font-size: 0.85rem;
      text-align: center;
    }

    .form-group {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 0.4rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
    }

    input::placeholder { color: #475569; }

    input:focus {
      border-color: rgba(99, 102, 241, 0.6);
      background: rgba(99, 102, 241, 0.05);
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.85rem;
      margin-top: 0.5rem;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.01em;
    }

    button[type="submit"]:hover  { opacity: 0.9; }
    button[type="submit"]:active { transform: scale(0.98); }

    .footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-icon">⚔️</span>
      <h1>L2M 마켓 분석기</h1>
      <p>거래소 꿀매물 대시보드</p>
    </div>

    <!-- URL에 ?error=1 이면 오류 메시지 표시 -->
    <div id="error-box" class="error-box" style="display:none;">
      아이디 또는 비밀번호가 올바르지 않습니다.
    </div>

    <form method="POST" action="/auth/login" autocomplete="on">
      <div class="form-group">
        <label for="username">아이디</label>
        <input
          id="username"
          type="text"
          name="username"
          placeholder="username"
          autocomplete="username"
          required
          autofocus
        />
      </div>
      <div class="form-group">
        <label for="password">비밀번호</label>
        <input
          id="password"
          type="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>
      <button type="submit">로그인</button>
    </form>

    <p class="footer">© 2026 L2M Market Analyzer</p>
  </div>

  <script>
    // URL에 error=1 파라미터가 있으면 오류 박스 표시
    if (new URLSearchParams(location.search).get('error') === '1') {
      document.getElementById('error-box').style.display = 'block';
    }
  </script>
</body>
</html>
